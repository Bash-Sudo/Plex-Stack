# Ultimate Plex Stack — Windows Docker Desktop edition
#
# Environment variables are set by the setup wizard at http://localhost:7979
# or by editing the .env file directly (copy .env.example to .env first).
#
# On first run, only plex-control starts (the wizard).
# The wizard deploys the rest of the stack once configured.

---
name: plex-stack
services:

  # ── Plex — media server ────────────────────────────────────────────────────
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
    ports:
      - 32400:32400
    volumes:
      - ${BASE_PATH:-/tmp}/plex/config:/config
      - ${MEDIA_SHARE:-/tmp}/media/tv:/tv
      - ${MEDIA_SHARE:-/tmp}/media/movies:/movies
    restart: unless-stopped

  # ── Radarr — movie automation ──────────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${BASE_PATH:-/tmp}/radarr/config:/config
      - ${MEDIA_SHARE:-/tmp}:/data
    ports:
      - 7878:7878
    restart: unless-stopped

  # ── Sonarr — TV show automation ────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${BASE_PATH:-/tmp}/sonarr/config:/config
      - ${MEDIA_SHARE:-/tmp}:/data
    ports:
      - 8989:8989
    restart: unless-stopped

  # ── Prowlarr — indexer manager ─────────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${BASE_PATH:-/tmp}/prowlarr/config:/config
    ports:
      - 9696:9696
    restart: unless-stopped

  # ── Autobrr — instant torrent grabber ─────────────────────────────────────
  autobrr:
    image: ghcr.io/autobrr/autobrr:latest
    container_name: autobrr
    environment:
      - TZ=${TZ:-UTC}
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      - ${BASE_PATH:-/tmp}/autobrr/config:/config
    ports:
      - 7474:7474
    restart: unless-stopped

  # ── Seerr — media request portal ──────────────────────────────────────────
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=info
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
      - PORT=5055
    volumes:
      - ${BASE_PATH:-/tmp}/seer/config:/app/config
      - ${MEDIA_SHARE:-/tmp}:/data
    ports:
      - 5055:5055
    restart: unless-stopped

  # ── qBittorrent + VPN ─────────────────────────────────────────────────────
  qbit-vpn:
    image: binhex/arch-qbittorrentvpn:latest
    container_name: qbit-vpn
    network_mode: bridge
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=0
      - PGID=0
      - UMASK=000
      - TZ=${TZ:-UTC}
      - WEBUI_PORT=8080
      - VPN_ENABLED=${VPN_ENABLED:-yes}
      - VPN_USER=${VPN_USER}
      - VPN_PASS=${VPN_PASS}
      - VPN_PROV=${VPN_PROV:-pia}
      - VPN_CLIENT=${VPN_CLIENT:-wireguard}
      - STRICT_PORT_FORWARD=yes
      - LAN_NETWORK=${LAN_NETWORK:-192.168.1.0/24}
      - ENABLE_STARTUP_SCRIPTS=no
      - NAME_SERVERS=1.1.1.1,1.0.0.1
      - ENABLE_PRIVOXY=yes
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    privileged: true
    ports:
      - 8080:8080
      - 8118:8118
      - 58946:58946
      - 58946:58946/udp
    volumes:
      - ${BASE_PATH:-/tmp}/qbittorrent/config:/config
      - ${MEDIA_SHARE:-/tmp}:/data
    restart: unless-stopped

  # ── Tautulli — Plex analytics ──────────────────────────────────────────────
  tautulli:
    image: lscr.io/linuxserver/tautulli:latest
    container_name: tautulli
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-UTC}
    volumes:
      - ${BASE_PATH:-/tmp}/tautulli/config:/config
    ports:
      - 8181:8181
    restart: unless-stopped

  # ── Wizarr — invite link generator ────────────────────────────────────────
  wizarr:
    image: ghcr.io/wizarrrr/wizarr:latest
    container_name: wizarr
    ports:
      - 5690:5690
    volumes:
      - ${BASE_PATH:-/tmp}/wizarr/data/database:/data/database
    restart: unless-stopped

  # ── Prefetcharr — auto-download next episode ───────────────────────────────
  prefetcharr:
    image: phueber/prefetcharr:latest
    container_name: prefetcharr
    volumes:
      - ./prefetcharr/config.toml:/config
      - ./prefetcharr/logs:/log
    restart: unless-stopped

  # ── Plex Stack Control Panel ───────────────────────────────────────────────
  # First run: only this container starts (via Windows_Install.bat)
  # It serves the setup wizard at http://localhost:7979
  # The wizard then deploys the full stack once configured.
  plex-control:
    build: .
    container_name: plex-control
    ports:
      - 7979:7979
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/app
      - ${MEDIA_SHARE:-/tmp}:/mnt/media:ro
      - ${BASE_PATH:-/tmp}:/mnt/config:ro
    restart: unless-stopped
